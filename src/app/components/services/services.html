<section class="w-full py-20">
  <div class="max-w-7xl mx-auto px-6">

    <h2 class="text-3xl font-bold mb-12">[Our Services]</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (service of services; track service.slug) {
        <article class="flex flex-col gap-4">
          <div class="w-full aspect-video overflow-hidden">
            <img [src]="service.image" [alt]="service.name" class="w-full h-full object-cover" />
          </div>
          <h3 class="text-xl font-semibold">{{ service.name }}</h3>
          <p>{{ service.description }}</p>
          <a [routerLink]="['/services', service.slug]" class="mt-auto underline">[Learn more >]</a>
        </article>
      }
    </div>

  </div>
</section>
