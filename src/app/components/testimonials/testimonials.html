<section class="w-full py-20">
  <div class="max-w-7xl mx-auto px-6">

    <h2 class="text-3xl font-bold mb-12">{{ lang.dict().testimonials.title }}</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (item of lang.dict().testimonials.items; track item.company) {
        <blockquote class="flex flex-col gap-4 p-6 border">
          <p class="text-lg font-medium">{{ item.quote }}</p>
          <footer class="mt-auto">
            <strong>{{ item.author }}</strong>
            <span> — {{ item.company }}</span>
          </footer>
        </blockquote>
      }
    </div>

  </div>
</section>
