<section class="w-full py-12 border-y">
  <div class="max-w-7xl mx-auto px-6">
    <ul class="flex flex-wrap items-center justify-center gap-12 list-none">
      @for (partner of partners; track partner.name) {
        <li class="flex flex-col items-center gap-2">
          <img [src]="partner.logo" [alt]="partner.name" class="h-16 w-auto object-contain" />
          <span class="text-sm">{{ partner.name }}</span>
        </li>
      }
    </ul>
  </div>
</section>
