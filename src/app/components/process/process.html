<section class="w-full py-20">
  <div class="max-w-7xl mx-auto px-6">

    <h2 class="text-3xl font-bold mb-12">[How We Work — Ensuring the Result]</h2>

    <ol class="flex flex-col gap-0 list-none">
      @for (step of steps; track step.number) {
        <li class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center py-12 border-b">

          <!-- Text side (alternates: even steps flip image/text) -->
          <div class="flex gap-6 items-start" [class.lg:order-2]="step.number % 2 === 0">
            <span class="text-5xl font-bold opacity-30">{{ step.number }}</span>
            <p class="text-lg">{{ step.text }}</p>
          </div>

          <!-- Image side -->
          <div class="w-full aspect-video overflow-hidden" [class.lg:order-1]="step.number % 2 === 0">
            <img [src]="step.image" [alt]="'Step ' + step.number" class="w-full h-full object-cover" />
          </div>

        </li>
      }
    </ol>

  </div>
</section>
